<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Status Assessment | Life Changers Financial Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1a2744;
      --teal:   #2e6e6e;
      --gold:   #c9a84c;
      --bg:     #f0f1f5;
      --white:  #ffffff;
      --text:   #1a2744;
      --sub:    #5a6478;
      --border: #d8dae4;
    }

    html, body { min-height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Navbar ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 64px;
    }
    .navbar-brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--navy); font-weight: 700; letter-spacing: -0.01em; }
    .navbar-cta {
      background: var(--navy); color: var(--white); border: none; border-radius: 50px;
      padding: 9px 22px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none;
      transition: background 0.2s;
    }
    .navbar-cta:hover { background: var(--teal); }

    .page { padding-top: 64px; min-height: 100vh; }

    /* ══════════════════════════════════════════
       INTRO SCREEN
    ══════════════════════════════════════════ */
    .intro-screen { display: flex; flex-direction: column; }

    /* Banner — lighter overlay so faces are visible */
    .banner {
      position: relative; width: 100%; height: 520px; overflow: hidden;
      background: var(--navy);
    }
    .banner-slide {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
      opacity: 0; transition: opacity 1.2s ease-in-out;
    }
    .banner-slide.active { opacity: 1; }
    .banner-slide::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(26,39,68,0.45) 0%, rgba(26,39,68,0.18) 55%, transparent 100%);
    }
    .banner-label {
      position: absolute; bottom: 0; right: 0; z-index: 2;
      padding: 0 48px 40px 0; text-align: right;
    }
    .banner-label-name {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(2rem, 5vw, 3.4rem); color: var(--white);
      line-height: 1.1; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      opacity: 0; transition: opacity 0.8s ease-in-out;
    }
    .banner-label-name.visible { opacity: 1; }

    /* Intro content */
    .intro-content {
      background: var(--white); padding: 60px 24px 72px;
      text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .intro-eyebrow {
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--teal);
    }
    .intro-title {
      font-family: 'Playfair Display', serif; font-size: clamp(1.9rem, 4vw, 2.8rem);
      color: var(--navy); font-weight: 700; line-height: 1.2; max-width: 620px;
    }
    .intro-body {
      font-size: 1.05rem; color: var(--sub); max-width: 560px; line-height: 1.75;
    }
    .intro-start {
      margin-top: 8px;
      background: var(--teal); color: var(--white); border: none; border-radius: 50px;
      padding: 15px 40px; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .intro-start:hover { background: var(--navy); transform: translateY(-1px); }
    .intro-note { font-size: 0.85rem; color: var(--sub); }

    /* ══════════════════════════════════════════
       QUIZ SCREEN
    ══════════════════════════════════════════ */
    .quiz-screen { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }

    .quiz-assessment-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--sub); text-align: center; margin-bottom: 10px;
    }
    .quiz-meta {
      display: flex; align-items: center; gap: 14px; margin-bottom: 32px;
    }
    .quiz-counter {
      font-size: 0.85rem; font-weight: 600; color: var(--teal); white-space: nowrap; min-width: 110px;
    }
    .progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.4s ease; }

    .quiz-question {
      font-family: 'Playfair Display', serif; font-size: clamp(1.25rem, 2.8vw, 1.65rem);
      color: var(--navy); font-weight: 700; line-height: 1.35; margin-bottom: 36px;
      text-align: center;
    }
    .quiz-subhead {
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--sub); text-align: center; margin-bottom: 12px;
    }

    /* Binary choice cards — gap between them */
    .choices-wrap {
      position: relative; display: flex; align-items: stretch; gap: 20px;
    }
    .choice-card {
      flex: 1; background: var(--white); border: 2px solid var(--border);
      border-radius: 16px; padding: 32px 24px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      text-align: center; transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      min-height: 210px; justify-content: center;
    }
    .choice-card:hover { border-color: var(--teal); box-shadow: 0 8px 32px rgba(46,110,110,0.12); transform: translateY(-2px); }
    .choice-card.selected { border-color: var(--teal); background: #f0f7f7; box-shadow: 0 8px 32px rgba(46,110,110,0.18); }
    .choice-icon svg { width: 48px; height: 48px; }
    .choice-label { font-size: 1rem; font-weight: 600; color: var(--navy); line-height: 1.4; }

    .or-badge {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--navy); color: var(--white);
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em;
      display: flex; align-items: center; justify-content: center;
      z-index: 2; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      pointer-events: none;
    }

    /* Slider */
    .slider-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .slider-labels { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; }
    .slider-label { font-size: 0.8rem; color: var(--sub); max-width: 120px; text-align: center; line-height: 1.3; }
    .slider-label:first-child { text-align: left; }
    .slider-label:last-child { text-align: right; }
    .slider-value-display { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; color: var(--teal); }
    input[type=range] { width: 100%; -webkit-appearance: none; height: 6px; background: var(--border); border-radius: 3px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--teal); cursor: pointer; border: 3px solid var(--white); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    /* Multi-select */
    .multiselect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .ms-chip { background: var(--white); border: 2px solid var(--border); border-radius: 12px; padding: 14px 16px; cursor: pointer; text-align: center; font-size: 0.9rem; font-weight: 500; color: var(--navy); transition: border-color 0.2s, background 0.2s; }
    .ms-chip:hover { border-color: var(--teal); }
    .ms-chip.selected { border-color: var(--teal); background: #f0f7f7; }

    /* Next button */
    .btn-next { display: block; margin: 36px auto 0; background: var(--navy); color: var(--white); border: none; border-radius: 50px; padding: 14px 44px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-next:hover { background: var(--teal); transform: translateY(-1px); }

    /* ══════════════════════════════════════════
       GENERATING SCREEN
    ══════════════════════════════════════════ */
    .generating-screen {
      min-height: calc(100vh - 64px); display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px;
      background: var(--white);
    }
    .gen-title {
      font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--navy);
      font-weight: 700; margin-bottom: 36px; text-align: center;
    }
    .gen-bar-track {
      width: min(420px, 100%); height: 6px; background: var(--border); border-radius: 3px;
      overflow: hidden; margin-bottom: 40px;
    }
    .gen-bar-fill {
      height: 100%; background: var(--teal); border-radius: 3px; width: 0%;
      animation: genFill 2.2s ease forwards;
    }
    @keyframes genFill { from { width: 0% } to { width: 100% } }

    .gen-lines { display: flex; flex-direction: column; gap: 14px; width: min(420px, 100%); }
    .gen-line {
      display: flex; align-items: center; gap: 12px;
      opacity: 0; animation: genLineIn 0.5s ease forwards;
      font-size: 0.95rem; color: var(--sub);
    }
    .gen-line.done { color: var(--teal); font-weight: 600; font-size: 1rem; }
    .gen-line-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0;
    }
    .gen-line.done .gen-line-dot { background: var(--teal); }
    .gen-line:nth-child(1) { animation-delay: 0.3s; }
    .gen-line:nth-child(2) { animation-delay: 0.85s; }
    .gen-line:nth-child(3) { animation-delay: 1.45s; }
    .gen-line:nth-child(4) { animation-delay: 2.05s; }
    @keyframes genLineIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

    /* ══════════════════════════════════════════
       TEASER SCREEN
    ══════════════════════════════════════════ */
    .teaser-screen { max-width: 640px; margin: 0 auto; padding: 52px 24px 80px; }

    .teaser-eyebrow { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--teal); text-align: center; margin-bottom: 10px; }
    .teaser-headline {
      font-family: 'Playfair Display', serif; font-size: clamp(1.7rem, 4vw, 2.4rem);
      color: var(--navy); font-weight: 700; text-align: center; line-height: 1.2; margin-bottom: 28px;
    }

    /* Winner hero image */
    .teaser-hero {
      width: 100%; height: 300px; border-radius: 16px; overflow: hidden; margin-bottom: 28px;
      position: relative;
    }
    .teaser-hero img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .teaser-hero-overlay {
      position: absolute; inset: 0; border-radius: 16px;
      background: linear-gradient(to top, rgba(26,39,68,0.5) 0%, transparent 60%);
    }

    /* Teaser description */
    .teaser-desc-card {
      background: var(--white); border-radius: 14px; border: 2px solid var(--border);
      padding: 24px 28px; margin-bottom: 28px;
    }
    .teaser-desc-visible { font-size: 1rem; color: var(--text); line-height: 1.7; margin-bottom: 14px; }
    .teaser-desc-locked {
      filter: blur(5px); user-select: none; pointer-events: none;
      font-size: 0.95rem; color: var(--sub); line-height: 1.7; margin-bottom: 10px;
    }
    .teaser-lock-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; font-weight: 600; color: var(--sub);
      border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px;
    }

    /* Score bars */
    .teaser-bars { margin-bottom: 32px; }
    .teaser-bars-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sub); margin-bottom: 14px; }
    .score-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .score-bar-label { font-size: 0.82rem; font-weight: 500; color: var(--text); width: 150px; flex-shrink: 0; line-height: 1.2; }
    .score-bar-track { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 5px; background: var(--navy); transition: width 0.8s ease; }
    .score-bar-row.winner .score-bar-fill { background: var(--gold); }
    .score-bar-row.blurred { filter: blur(4px); pointer-events: none; user-select: none; }
    .score-bar-pct { font-size: 0.8rem; font-weight: 600; color: var(--sub); width: 36px; text-align: right; flex-shrink: 0; }
    .score-bar-row.winner .score-bar-pct { color: var(--teal); }

    /* Email gate — inline on teaser */
    .teaser-gate {
      background: var(--navy); border-radius: 18px; padding: 32px 28px;
      display: flex; flex-direction: column; gap: 14px; text-align: center;
    }
    .gate-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--white); font-weight: 700; line-height: 1.3; }
    .gate-sub { font-size: 0.9rem; color: rgba(255,255,255,0.7); line-height: 1.5; }
    .gate-input {
      width: 100%; padding: 13px 20px; border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50px; font-size: 0.95rem; outline: none; background: rgba(255,255,255,0.1);
      color: var(--white); font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    .gate-input::placeholder { color: rgba(255,255,255,0.45); }
    .gate-input:focus { border-color: var(--gold); }
    .gate-submit {
      width: 100%; background: var(--gold); color: var(--navy); border: none; border-radius: 50px;
      padding: 14px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .gate-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .gate-note { font-size: 0.75rem; color: rgba(255,255,255,0.45); }

    /* ══════════════════════════════════════════
       FULL RESULT SCREEN
    ══════════════════════════════════════════ */
    .result-screen { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }
    .result-heading { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 3.5vw, 2.4rem); color: var(--navy); font-weight: 700; text-align: center; margin-bottom: 8px; }
    .result-subhead { text-align: center; color: var(--sub); margin-bottom: 36px; font-size: 1rem; }

    /* Mosaic */
    .mosaic { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 240px 240px; gap: 6px; border-radius: 16px; overflow: hidden; margin-bottom: 40px; }
    .mosaic-tile { position: relative; overflow: hidden; background: var(--navy); }
    .mosaic-tile:nth-child(1) { grid-column: 1 / 2; grid-row: 1 / 2; }
    .mosaic-tile:nth-child(2) { grid-column: 2 / 3; grid-row: 1 / 2; }
    .mosaic-tile:nth-child(3) { grid-column: 3 / 4; grid-row: 1 / 3; }
    .mosaic-tile:nth-child(4) { grid-column: 1 / 2; grid-row: 2 / 3; }
    .mosaic-tile:nth-child(5) { grid-column: 2 / 3; grid-row: 2 / 3; }
    .mosaic-tile img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .mosaic-tile:hover img { transform: scale(1.04); }
    .mosaic-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,39,68,0.85) 0%, rgba(26,39,68,0.2) 60%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
    .mosaic-tile.winner .mosaic-overlay { background: linear-gradient(to top, rgba(46,110,110,0.9) 0%, rgba(46,110,110,0.35) 60%, transparent 100%); outline: 3px solid var(--teal); outline-offset: -3px; }
    .mosaic-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--white); font-weight: 600; line-height: 1.2; }
    .mosaic-pct { font-size: 1.5rem; font-weight: 700; color: var(--white); font-family: 'Playfair Display', serif; }
    .mosaic-tile.winner .mosaic-pct { color: #a8ddd0; }

    /* Profile card */
    .profile-card { background: var(--white); border-radius: 20px; padding: 40px; border: 2px solid var(--border); margin-bottom: 24px; }
    .profile-card-eyebrow { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teal); margin-bottom: 8px; }
    .profile-card-name { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--navy); font-weight: 700; margin-bottom: 16px; }
    .profile-card-desc { color: var(--sub); line-height: 1.75; font-size: 1rem; }

    .btn-cta { display: block; text-align: center; width: 100%; max-width: 360px; margin: 0 auto; background: var(--teal); color: var(--white); border: none; border-radius: 50px; padding: 16px 32px; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.2s, transform 0.1s; }
    .btn-cta:hover { background: var(--navy); transform: translateY(-1px); }

    /* Transitions */
    .fade-enter { animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* Responsive */
    @media (max-width: 600px) {
      .navbar { padding: 0 16px; }
      .banner { height: 360px; }
      .banner-label { padding: 0 20px 24px 0; }
      /* Cards stack on mobile */
      .choices-wrap { flex-direction: column; gap: 16px; }
      .or-badge { top: 50%; left: 50%; }
      .choice-card { min-height: 120px; padding: 20px 16px; }
      .choice-icon svg { width: 38px; height: 38px; }
      .mosaic { grid-template-columns: 1fr 1fr; grid-template-rows: 180px 180px 180px; }
      .mosaic-tile:nth-child(3) { grid-column: 1 / 3; grid-row: 3 / 4; }
      .profile-card { padding: 28px 20px; }
      .score-bar-label { width: 120px; }
      .teaser-gate { padding: 24px 20px; }
    }
  </style>
</head>

// ── Scoring ────────────────────────────────────────────────────────────────
function computeScores() {
  const logits = {};
  for (const [key, profile] of Object.entries(PROFILES)) {
    let score = profile.intercept;
    for (const [qid, w] of Object.entries(profile.weights)) {
      const ans = STATE.answers[qid];
      if (ans !== undefined) score += w * ans;
    }
    logits[key] = score;
  }
  const maxL = Math.max(...Object.values(logits));
  const exps = {};
  let sumExp = 0;
  for (const k in logits) { exps[k] = Math.exp(logits[k] - maxL); sumExp += exps[k]; }
  const probs = {};
  for (const k in exps) probs[k] = exps[k] / sumExp;
  return probs;
}

function getWinner(scores) {
  return Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
}

// ── Banner ─────────────────────────────────────────────────────────────────
let bannerTimer = null;
let bannerIdx = 0;

function startBanner() {
  const container = document.getElementById('banner-slides');
  const labelEl = document.getElementById('banner-label-name');
  if (!container) return;
  function show(idx) {
    container.querySelectorAll('.banner-slide').forEach((s,i) => s.classList.toggle('active', i === idx));
    labelEl.classList.remove('visible');
    setTimeout(() => { labelEl.textContent = BANNER_IMAGES[idx].label; labelEl.classList.add('visible'); }, 200);
  }
  show(0);
  bannerTimer = setInterval(() => { bannerIdx = (bannerIdx + 1) % BANNER_IMAGES.length; show(bannerIdx); }, 3500);
}

function stopBanner() {
  if (bannerTimer) { clearInterval(bannerTimer); bannerTimer = null; }
}

// ── Render router ──────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'fade-enter';

  if (STATE.screen === 'intro') {
    el.innerHTML = renderIntro();
    app.appendChild(el);
    setTimeout(startBanner, 50);
    return;
  }
  stopBanner();
  if (STATE.screen === 'quiz') { el.innerHTML = renderQuiz(); app.appendChild(el); attachQuizHandlers(); return; }
  if (STATE.screen === 'generating') { el.innerHTML = renderGenerating(); app.appendChild(el); setTimeout(() => { STATE.screen = 'teaser'; render(); }, 2700); return; }
  if (STATE.screen === 'teaser') { el.innerHTML = renderTeaser(); app.appendChild(el); attachTeaserHandlers(); return; }
  if (STATE.screen === 'result') { el.innerHTML = renderResult(); app.appendChild(el); return; }
  app.appendChild(el);
}

// ── Quiz ───────────────────────────────────────────────────────────────────

          <div class="choice-icon">${ICONS[q.b.icon]||''}</div>
          <div class="choice-label">${q.b.label}</div>
        </div>
      </div>
    `;
  } else if (q.type === 'slider') {
    const val = STATE.sliderValues[q.id] || 3;

      <div class="quiz-question">${q.text}</div>
      <div class="slider-wrap">

        <input type="range" id="slider-input" min="${q.min}" max="${q.max}" value="${val}" />

          <span class="slider-label">${q.labelMax}</span>
        </div>
      </div>
      <button class="btn-next" id="btn-next">Continue &rarr;</button>
    `;

    const chips = q.options.map(o => `<div class="ms-chip ${STATE.multiselect.includes(o)?'selected':''}" data-opt="${o}">${o}</div>`).join('');

      <div class="quiz-question">${q.text}</div>
      <p style="text-align:center;color:var(--sub);font-size:0.88rem;margin-bottom:20px;">Select up to 3</p>
      <div class="multiselect-grid">${chips}</div>
      <button class="btn-next" id="btn-next">Continue &rarr;</button>
    `;
  }

  return `
    <div class="quiz-screen">
      <div class="quiz-assessment-label">Financial Status Assessment</div>
      <div class="quiz-meta">
        <div class="quiz-counter">Question ${qNum} of ${total}</div>

}

function attachQuizHandlers() {
  const q = QUESTIONS[STATE.currentQ];
  if (q.type === 'binary') {
    document.querySelectorAll('.choice-card').forEach(card => {
      card.addEventListener('click', () => {
        STATE.answers[q.id] = parseInt(card.dataset.answer);
        card.classList.add('selected');
        setTimeout(advance, 300);
      });
    });
  }
  if (q.type === 'slider') {
    const inp = document.getElementById('slider-input');
    const disp = document.getElementById('slider-val');
    if (!STATE.sliderValues[q.id]) STATE.sliderValues[q.id] = 3;
    inp.addEventListener('input', () => { STATE.sliderValues[q.id] = parseInt(inp.value); disp.textContent = inp.value; });
    document.getElementById('btn-next').addEventListener('click', advance);
  }
  if (q.type === 'multiselect') {
    document.querySelectorAll('.ms-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const opt = chip.dataset.opt;
        if (STATE.multiselect.includes(opt)) { STATE.multiselect = STATE.multiselect.filter(o => o !== opt); chip.classList.remove('selected'); }
        else if (STATE.multiselect.length < 3) { STATE.multiselect.push(opt); chip.classList.add('selected'); }
      });
    });
    document.getElementById('btn-next').addEventListener('click', advance);
  }
}

function advance() {
  if (STATE.currentQ < QUESTIONS.length - 1) {
    STATE.currentQ++;
    STATE.screen = 'quiz';
    render();
  } else {
    STATE.screen = 'generating';
    render();
  }
}

    STATE.email = val;
    fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: STATE.email,
        profile: STATE.winner,
        profileName: PROFILES[STATE.winner].name,
        percentage: Math.round(STATE.scores[STATE.winner] * 100),
        scores: Object.fromEntries(Object.entries(STATE.scores).map(([k,v]) => [k, Math.round(v*100)])),

        priorities: STATE.multiselect,

      <p class="result-subhead" style="margin-bottom:32px;">Your full profile comparison across all five financial identities</p>

}
